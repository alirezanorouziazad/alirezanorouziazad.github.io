<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g1" cx="20%" cy="30%" r="60%" fx="20%" fy="30%">
      <stop offset="0%" stop-color="#312e81" stop-opacity="1"/>
      <stop offset="50%" stop-color="#1e1b4b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="70%" r="50%" fx="80%" fy="70%">
      <stop offset="0%" stop-color="#4c1d95" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#2e1065" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="60%" cy="20%" r="40%" fx="60%" fy="20%">
      <stop offset="0%" stop-color="#3730a3" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g4" cx="10%" cy="90%" r="45%" fx="10%" fy="90%">
      <stop offset="0%" stop-color="#581c87" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
  </defs>
  
  <!-- Base dark background -->
  <rect width="100%" height="100%" fill="#030712"/>
  
  <!-- Gradient orbs -->
  <g filter="url(#blur1)">
    <ellipse cx="384" cy="324" rx="600" ry="450" fill="url(#g1)"/>
    <ellipse cx="1536" cy="756" rx="500" ry="400" fill="url(#g2)"/>
    <ellipse cx="1152" cy="216" rx="400" ry="300" fill="url(#g3)"/>
    <ellipse cx="192" cy="972" rx="450" ry="350" fill="url(#g4)"/>
  </g>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(99,102,241,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <!-- Noise texture overlay -->
  <rect width="100%" height="100%" filter="url(#noise)" opacity="0.5"/>
</svg>
